<div class="attributes-tab">
  <div class="section-header">
    <h3>Атрибути варіацій</h3>
    <p>Значення атрибутів використовуються при створенні варіацій продукту.</p>
  </div>

  <mat-tab-group animationDuration="150ms" color="primary" class="attr-tabs">
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">palette</mat-icon>
        Колір
      </ng-template>

      <app-color-attribute-tab />
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">science</mat-icon>
        Матеріал
      </ng-template>

      <app-material-attribute-tab />
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">scale</mat-icon>
        Вага
      </ng-template>

      <app-weight-attribute-tab />
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">straighten</mat-icon>
        Діаметр
      </ng-template>

      <app-diameter-attribute-tab />
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">data_usage</mat-icon>
        Розмір котушки
      </ng-template>

      <app-spool-attribute-tab />
    </mat-tab>
  </mat-tab-group>
</div>
