<div class="dashboard">
  <div class="page-header">
    <h1 class="page-title">Дашборд</h1>
    <a mat-flat-button color="primary" routerLink="/crm/products/create">
      <mat-icon>add</mat-icon>
      Додати продукт
    </a>
  </div>

  <div class="stats-grid">
    @for (stat of stats; track stat.label) {
      <mat-card class="stat-card">
        <mat-card-content class="stat-content">
          <div class="stat-icon" [style.background]="stat.color + '1a'">
            <mat-icon [style.color]="stat.color">{{ stat.icon }}</mat-icon>
          </div>
          <div class="stat-info">
            <span class="stat-value">{{ stat.value }}</span>
            <span class="stat-label">{{ stat.label }}</span>
          </div>
        </mat-card-content>
      </mat-card>
    }
  </div>

  <div class="quick-actions">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Швидкі дії</mat-card-title>
      </mat-card-header>
      <mat-card-content class="actions-grid">
        <a mat-stroked-button routerLink="/crm/products">
          <mat-icon>inventory_2</mat-icon>
          Всі продукти
        </a>
        <a mat-stroked-button routerLink="/crm/products/create">
          <mat-icon>add_box</mat-icon>
          Новий продукт
        </a>
      </mat-card-content>
    </mat-card>
  </div>
</div>
