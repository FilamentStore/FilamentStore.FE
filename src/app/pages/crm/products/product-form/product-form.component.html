<div class="product-form-page">
  <div class="page-header">
    <div class="page-title">
      <button mat-icon-button (click)="cancel()" matTooltip="Назад до списку">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <mat-icon>{{ isEditMode() ? 'edit' : 'add_box' }}</mat-icon>
      <h1>{{ isEditMode() ? 'Редагувати продукт' : 'Новий продукт' }}</h1>
    </div>

    <div class="header-actions">
      <button mat-stroked-button type="button" (click)="cancel()">
        Скасувати
      </button>
      <button
        mat-flat-button
        color="primary"
        type="button"
        (click)="save()"
        [disabled]="saving()"
      >
        @if (saving()) {
          <mat-spinner diameter="18" />
        } @else {
          <mat-icon>save</mat-icon>
        }
        {{ saving() ? 'Збереження...' : 'Зберегти' }}
      </button>
    </div>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      @if (loading() && isEditMode()) {
        <div class="loading-overlay">
          <mat-spinner diameter="48" />
          <p>Завантаження...</p>
        </div>
      }
      <mat-tab-group
        animationDuration="200ms"
        color="primary"
        style="width: 100%"
        [class.tabs-hidden]="loading() && isEditMode()"
      >
        <mat-tab>
          <ng-template mat-tab-label>
            <mat-icon class="tab-icon">info</mat-icon>
            Основне
          </ng-template>
          <div class="tab-content">
            <app-tab-basic
              [form]="form"
              [categories]="categories()"
              [brands]="brands()"
              [images]="images()"
              [onImagesChange]="setImages"
            />
          </div>
        </mat-tab>

        <mat-tab>
          <ng-template mat-tab-label>
            <mat-icon class="tab-icon">tune</mat-icon>
            Атрибути
          </ng-template>
          <div class="tab-content">
            <app-tab-attributes
              [attributes]="attributes()"
              [colorsList]="colors()"
              [simpleAttributes]="simpleAttributes()"
              (attributesChange)="setAttributes($event)"
              (generateVariations)="save()"
            />
          </div>
        </mat-tab>

        <mat-tab [disabled]="!isEditMode()">
          <ng-template mat-tab-label>
            <mat-icon class="tab-icon">view_list</mat-icon>
            Варіації
            @if (!isEditMode()) {
              <span class="tab-hint"> (спочатку збережіть)</span>
            }
          </ng-template>
          <div class="tab-content">
            @if (isEditMode()) {
              <app-tab-variations
                [productId]="productId()!"
                [attributes]="selectedAttributes()"
                [colorsList]="colors()"
                [simpleAttributes]="simpleAttributes()"
                [skuPrefix]="skuPrefix()"
              />
            }
          </div>
        </mat-tab>
      </mat-tab-group>
    </mat-card-content>
  </mat-card>
</div>
