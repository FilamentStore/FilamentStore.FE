<section class="favorites">
  <div class="favorites__header">
    <app-breadcrumb [items]="[{ label: 'Обране' }]" />
    <h1 class="favorites__title">Обране</h1>
  </div>

  @if (loading()) {
    <div class="favorites__loader">
      <span class="favorites__spinner"></span>
    </div>
  } @else if (!cards().length) {
    <div class="favorites__empty">
      <svg
        viewBox="0 0 24 24"
        width="48"
        height="48"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
        />
      </svg>
      <p>Поки що немає обраних товарів</p>
      <a class="favorites__cta" routerLink="/catalog">Перейти до каталогу</a>
    </div>
  } @else {
    <div class="favorites__grid">
      @for (card of cards(); track card.variation.id) {
        <app-product-card
          [product]="card.product"
          [variation]="card.variation"
          [isFavorite]="true"
          (addToCart)="onAddToCart($event)"
          (toggleFavorite)="onToggleFavorite($event)"
        />
      }
    </div>
  }
</section>
