<section
  class="hero"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  @for (slide of slides; track slide.material; let i = $index) {
    <div
      class="hero__slide hero__slide--{{ slide.material.toLowerCase() }}"
      [class.hero__slide--active]="activeIndex() === i"
    >
      <div class="hero__blob hero__blob--1"></div>
      <div class="hero__blob hero__blob--2"></div>
      <div class="hero__blob hero__blob--3"></div>
      <div class="hero__visual" aria-hidden="true">
        <svg
          class="hero__decor hero__decor--main"
          viewBox="0 0 460 360"
          fill="none"
        >
          <path
            d="M90.8 44.2C131.7 10.8 194.2 13.9 247.4 27.1C293.8 38.5 330.7 63.8 367.1 92.1C406.5 122.7 449.5 161.6 456.8 212.6C464 263.1 433.8 313.7 389.3 339.5C347.4 363.9 296.6 353.4 249.5 348.4C199.4 343.1 141.6 349 106.3 312.8C69.9 275.5 78 216 57.3 168.3C39.3 126.8 2.1 89.3 19.2 52.1C37.5 12.3 82.3 51.1 90.8 44.2Z"
            fill="currentColor"
          />
        </svg>
        <svg
          class="hero__decor hero__decor--accent"
          viewBox="0 0 220 190"
          fill="none"
        >
          <path
            d="M56.2 18.6C81 4.2 111.4 20.6 138.1 31.1C158.5 39.1 184.5 39.9 197.7 57.5C212.7 77.4 214.6 105.8 206.3 129.6C198.4 152.2 173.2 163.1 149.8 170.1C127.7 176.7 104.9 188.8 82.6 182.8C54.9 175.3 22.8 161.2 12.2 134.5C0.7 105.6 14.5 73 27.9 44.8C34.4 31.1 42.6 26.4 56.2 18.6Z"
            fill="currentColor"
          />
        </svg>
        <span class="hero__dot-ornament hero__dot-ornament--1"></span>
        <span class="hero__dot-ornament hero__dot-ornament--2"></span>
        <span class="hero__dot-ornament hero__dot-ornament--3"></span>
        <img
          class="hero__visual-image"
          [src]="slide.image"
          [alt]="slide.material"
        />
      </div>

      <div class="hero__content">
        <span class="hero__tag">{{ slide.material }}</span>
        <h1 class="hero__title">{{ slide.title }}</h1>
        <p class="hero__desc">{{ slide.description }}</p>
        <a class="hero__cta" [routerLink]="slide.ctaLink">{{ slide.cta }}</a>
      </div>

      <div class="hero__watermark" aria-hidden="true">FILAMENT</div>
    </div>
  }

  <nav class="hero__dots" aria-label="Навігація слайдера">
    @for (slide of slides; track slide.material; let i = $index) {
      <button
        class="hero__dot"
        [class.hero__dot--active]="activeIndex() === i"
        (click)="goTo(i)"
        [attr.aria-label]="'Слайд ' + (i + 1)"
      ></button>
    }
  </nav>
</section>

<app-products-slider
  title="Новинки"
  [items]="newArrivals"
  [loading]="newArrivalsLoading"
  (addToCart)="onAddToCart($event)"
  (toggleFavorite)="onToggleFavorite($event)"
/>

<app-categories-carousel
  [categories]="categories"
  [loading]="categoriesLoading"
/>

<app-products-slider
  title="Акційні"
  [items]="saleItems"
  [loading]="saleLoading"
  (addToCart)="onAddToCart($event)"
  (toggleFavorite)="onToggleFavorite($event)"
/>
