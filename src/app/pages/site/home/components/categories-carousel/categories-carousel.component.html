<section class="categories">
  <h2 class="categories__title">Категорії</h2>

  @if (loading) {
    <app-skeleton variant="categories" [count]="6" />
  } @else {
    <div class="categories__grid">
      @for (cat of categories; track cat.id) {
        <a
          class="categories__card"
          [routerLink]="['/catalog']"
          [queryParams]="{ category_id: cat.id }"
        >
          <div class="categories__info">
            <span class="categories__name">{{ cat.name }}</span>
            <span class="categories__cta">Переглянути</span>
          </div>

          @if (cat.image) {
            <div class="categories__media">
              <img
                class="categories__img"
                [src]="cat.image.src"
                [alt]="cat.name"
                loading="lazy"
              />
            </div>
          }
        </a>
      }
    </div>
  }
</section>
