<section class="products-slider">
  <div class="products-slider__head">
    <h2 class="products-slider__title">{{ title }}</h2>
    <div class="products-slider__arrows">
      <button
        class="products-slider__arrow"
        (click)="scroll(-1)"
        aria-label="Назад"
      >
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
      <button
        class="products-slider__arrow"
        (click)="scroll(1)"
        aria-label="Вперед"
      >
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="9 6 15 12 9 18" />
        </svg>
      </button>
    </div>
  </div>

  @if (loading) {
    <div class="products-slider__loader">
      <span class="products-slider__spinner"></span>
    </div>
  } @else {
    <div class="products-slider__viewport">
      <div class="products-slider__track" #track>
        @for (item of items; track item.variation.id) {
          <div class="products-slider__card">
            <app-product-card
              [product]="item.product"
              [variation]="item.variation"
              [isFavorite]="favoriteVariationIds().includes(item.variation.id)"
              (addToCart)="addToCart.emit($event)"
              (toggleFavorite)="onToggleFavorite($event)"
            />
          </div>
        }
      </div>
    </div>
  }
</section>
