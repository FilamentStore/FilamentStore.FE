<header class="header uppercase" [class.header--transparent]="isTransparent">
  <div class="header-left">
    <div class="header-logo">
      <a routerLink="/" class="logo-link">
        <img class="nav-img" src="assets/icons/logo.png" alt="Logo" />
      </a>
    </div>

    <div class="header-nav">
      <nav class="nav">
        <ul class="nav-list">
          <li>
            <a
              routerLink="/"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="nav-link"
            >
              Головна
            </a>
          </li>
          <li>
            <a
              routerLink="/catalog"
              routerLinkActive="is-active"
              class="nav-link"
            >
              Каталог
            </a>
          </li>
          <li>
            <a
              routerLink="/about"
              routerLinkActive="is-active"
              class="nav-link"
            >
              Про нас
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </div>

  <div class="header-icons">
    <div class="header-search" [class.header-search--open]="isSearchOpen">
      <div class="header-search__input-wrap">
        <input
          #searchInput
          class="header-search__input input-field__control"
          type="search"
          placeholder="Пошук..."
          aria-label="Глобальний пошук"
          (blur)="onSearchBlur($event)"
        />
      </div>
      <button
        class="header-search__btn"
        (click)="toggleSearch()"
        [attr.aria-label]="isSearchOpen ? 'Закрити пошук' : 'Відкрити пошук'"
      >
        <span class="header-search__icon" aria-hidden="true"></span>
      </button>
    </div>

    <a
      routerLink="/crm/auth/login"
      routerLinkActive="icon-account--active"
      class="icon-account"
      aria-label="Go to Account"
    >
      <span class="icon-img icon-img--account" aria-hidden="true"></span>
      <span class="icon-account__label">Увійти</span>
    </a>

    <a
      routerLink="/favorites"
      routerLinkActive="icon--active"
      class="icon"
      aria-label="Go to Favorites"
    >
      <span class="icon-img icon-img--favorite" aria-hidden="true"></span>
      @if (favoritesCount > 0) {
        <span class="icon-counter">{{ favoritesCount }}</span>
      }
    </a>

    <a
      routerLink="/cart"
      routerLinkActive="icon--active"
      class="icon"
      aria-label="Go to Shopping Bag"
    >
      <span class="icon-img icon-img--bag" aria-hidden="true"></span>
      @if (cartCount > 0) {
        <span class="icon-counter">{{ cartCount }}</span>
      }
    </a>

    <button
      (click)="isMenuOpen = true"
      class="icon-burger-menu"
      aria-label="Menu"
    ></button>
  </div>
</header>

@if (isMenuOpen) {
  <app-navbar [isOpen]="isMenuOpen" (closeMenu)="isMenuOpen = false" />
}
