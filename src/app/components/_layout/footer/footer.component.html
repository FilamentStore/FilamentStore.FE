<footer class="footer">
  <div class="footer-container">
    <div class="footer-logo">
      <img class="footer-logo-icon" src="assets/icons/Logo.png" alt="Logo" />
    </div>

    <div class="footer-nav-container">
      <a
        href="https://github.com/div-ine-Coders/product_catalog"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-nav-container-link uppercase"
        aria-label="Visit GitHub page"
      >
        GitHub
      </a>
      <a
        href="tel:+38000000000"
        class="footer-nav-container-link uppercase"
        aria-label="Call us"
      >
        Contacts
      </a>
      <a
        href="#"
        class="footer-nav-container-link uppercase"
        aria-label="View rights information"
      >
        Rights
      </a>
    </div>

    <div class="footer-back-container">
      <span class="footer-back-container-text smallText">Back to top</span>
      <button
        class="footer-back-container-button"
        (click)="scrollToTop()"
        aria-label="Back to top"
      >
        <!-- замінити на свій ArrowButton або іконку -->
        ↑
      </button>
    </div>
  </div>
</footer>
