[build]
  publish = "dist/FilamentStore.FE/browser"

[build.environment]
  NODE_VERSION = "22"

# Продакшн — гілка main
[context.production]
  command = "ng build --configuration production"

# Dev — гілка develop
[context.branch-deploy]
  command = "ng build --configuration development"

# Netlify proxy — обходить CORS на рівні InfinityFree
[[redirects]]
  from = "/api/*"
  to = "https://filamentstore-demo.xo.je/wp-json/:splat"
  status = 200
  force = true

# SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
